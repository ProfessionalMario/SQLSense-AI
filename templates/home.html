<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SQL Bot Chat</title>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-height: 100vh;
  }

  .container {
    display: flex;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 30px;
    height: 100%;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
    user-select: none;
  }

  .chat-window {
    flex: 1;
    background: #1e293b;
    border-radius: 12px;
    padding: 20px;
    overflow-y: auto;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .input-area {
    margin-top: 16px;
    display: flex;
    gap: 10px;
  }

  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
    outline: none;
    background-color: #334155;
    color: #f1f5f9;
  }

  input::placeholder {
    color: #94a3b8;
  }

  button {
    padding: 14px 24px;
    background: #3b82f6;
    border: none;
    border-radius: 20px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.25s ease;
    user-select: none;
  }

  button:hover:not(:disabled) {
    background: #2563eb;
  }

  button:disabled {
    background: #64748b;
    cursor: not-allowed;
  }

  /* Chat bubbles */

  .message {
    max-width: 75%;
    padding: 14px 20px;
    border-radius: 25px;
    font-size: 15px;
    line-height: 1.4;
    word-break: break-word;
    box-shadow: 0 3px 10px rgb(0 0 0 / 0.3);
    white-space: pre-wrap;
  }

  .user {
    align-self: flex-start;
    background: #2563eb;
    border-bottom-left-radius: 4px;
  }

  .bot {
    align-self: flex-end;
    background: #334155;
    border-bottom-right-radius: 4px;
  }

  /* Table inside bot bubble */

  .bot table {
    width: 100%;
    border-collapse: collapse;
    color: #e0e7ff;
    font-size: 14px;
  }

  .bot th,
  .bot td {
    border: 1px solid #475569;
    padding: 8px 12px;
    text-align: left;
  }

  .bot th {
    background-color: #3b82f6;
    color: white;
    position: sticky;
    top: 0;
  }

  .bot tr:hover {
    background-color: #4f7ef1;
  }

  .bot .table-wrapper {
    max-height: 300px;
    overflow-y: auto;
    border-radius: 12px;
    margin-top: 8px;
  }

  /* Scrollbar styling for chat window and table wrapper */
  .chat-window::-webkit-scrollbar,
  .bot .table-wrapper::-webkit-scrollbar {
    width: 8px;
  }

  .chat-window::-webkit-scrollbar-thumb,
  .bot .table-wrapper::-webkit-scrollbar-thumb {
    background: #64748b;
    border-radius: 10px;
  }

  /* Loading text style */
  .loading {
    font-style: italic;
    opacity: 0.75;
  }

  /* Error message */
  .error {
    color: #f87171;
    font-weight: 600;
  }

  /* Responsive tweak: reduce max-width on small screens */
  @media (max-width: 600px) {
    .container {
      max-width: 95vw;
      padding: 15px;
    }

    .message {
      max-width: 90%;
    }
  }
</style>
</head>
<body>

<div class="container" role="main" aria-label="SQL Bot chat container">
  <h2>💾 Ask SQL Bot</h2>

  <div id="chatWindow" class="chat-window" aria-live="polite" aria-label="Chat messages"></div>

  <div class="input-area">
    <input
      id="queryInput"
      type="text"
      placeholder="Ask your database anything... (e.g., 'Show customers with orders > 5')"
      autocomplete="off"
      aria-label="Enter your SQL query"
      spellcheck="false"
    />
    <button id="runBtn" aria-label="Run SQL query">Run</button>
  </div>
</div>

<script>
  const chatWindow = document.getElementById("chatWindow");
  const input = document.getElementById("queryInput");
  const button = document.getElementById("runBtn");

  // Helper to add message bubble
  function addMessage(text, sender = "bot", isHtml = false) {
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message", sender);
    if (isHtml) {
      msgDiv.innerHTML = text;
    } else {
      msgDiv.textContent = text;
    }
    chatWindow.appendChild(msgDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // Helper to add table inside bot bubble
  function addTable(data) {
    const tableWrapper = document.createElement("div");
    tableWrapper.classList.add("table-wrapper");

    const table = document.createElement("table");

    // Header row
    const headerRow = document.createElement("tr");
    for (let i = 0; i < data[0].length; i++) {
      const th = document.createElement("th");
      th.textContent = `Column ${i + 1}`;
      headerRow.appendChild(th);
    }
    table.appendChild(headerRow);

    // Data rows
    data.forEach((row) => {
      const tr = document.createElement("tr");
      row.forEach((cell) => {
        const td = document.createElement("td");
        td.textContent = cell;
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });

    tableWrapper.appendChild(table);

    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message", "bot");
    msgDiv.appendChild(tableWrapper);

    chatWindow.appendChild(msgDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // Run query handler
  async function sendQuery() {
    const query = input.value.trim();
    if (!query) return;

    addMessage(query, "user");
    input.value = "";
    button.disabled = true;
    addMessage("Running query...", "bot");

    try {
      const res = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: query }),
      });

      const data = await res.json();

      // Remove the "Running query..." message (last bot message)
      const lastBotMsg = Array.from(chatWindow.querySelectorAll(".bot")).pop();
      if (lastBotMsg && lastBotMsg.textContent === "Running query...") {
        chatWindow.removeChild(lastBotMsg);
      }

      if (data.detail) {
        addMessage(data.detail, "bot");
      } else {
        const result = data.response;
        if (
          Array.isArray(result) &&
          result.length > 0 &&
          Array.isArray(result[0])
        ) {
          addTable(result);
        } else if (typeof result === "string") {
          addMessage(result, "bot");
        } else {
          addMessage(JSON.stringify(result, null, 2), "bot");
        }
      }
    } catch (e) {
      addMessage("Something went wrong. Please try again.", "bot");
    } finally {
      button.disabled = false;
      input.focus();
    }
  }

  button.addEventListener("click", sendQuery);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      sendQuery();
    }
  });

  // Autofocus input on load
  input.focus();
</script>

</body>
</html>
